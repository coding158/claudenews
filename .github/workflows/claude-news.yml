name: Claude News Collector

on:
  schedule:
    - cron: '58 03 * * *'
  workflow_dispatch:

jobs:
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Run Claude News Collector
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Environment Check ==="
          node --version
          npm --version
          echo "Gmail user: $GMAIL_USER"
          echo "Recipient: $EMAIL_RECIPIENT"
          echo "Password set: $([ -n "$GMAIL_APP_PASSWORD" ] && echo yes || echo no)"
          echo "=== Starting Script ==="
          node 01-claudenews-main.js

permissions:
  contents: write
