name: Claude News Collector

on:
  # 主调度（准点）：外部 cron-job.org 到点带 PAT 打 repository_dispatch 触发，精准 11:58 北京。
  # 配置见 README「准点调度」/ 设计书附录 A2。
  repository_dispatch:
    types: [daily-news]

  # 手动触发
  workflow_dispatch:

  # 兜底（仅当外部触发挂掉时）：GitHub cron 延迟执行，时间晚于主触发；
  # 由 guard 步骤判断「今天是否已成功发过」避免同日双发。
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC ≈ 15:00 北京（晚于主触发 11:58，留时间差给 guard）

jobs:
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      # 护栏：若本次是 schedule 兜底且今天已由主触发成功发过(.last-sent==今天)，跳过，避免双发。
      - name: Guard — skip duplicate send
        id: guard
        run: |
          TODAY=$(TZ=Asia/Shanghai date +%F)
          LAST=$(head -1 .last-sent 2>/dev/null | tr -d '[:space:]' || true)
          echo "event=${{ github.event_name }} today=$TODAY last-sent=$LAST"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$LAST" = "$TODAY" ]; then
            echo "✅ 今天已由外部触发发过，跳过兜底。"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: '20'

      - name: Install Dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm install

      - name: Run Claude News Collector
        if: steps.guard.outputs.skip != 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          # AI 摘要：默认用 GitHub Models（免费，靠下面 models: read 权限 + GITHUB_TOKEN）
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'github' }}
          GITHUB_TOKEN: ${{ github.token }}
          # 想改用 DeepSeek：设 AI_PROVIDER=deepseek（仓库 Variables）+ 加 DEEPSEEK_API_KEY secret
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "=== Environment Check ==="
          node --version
          npm --version
          echo "=== Starting Script ==="
          node 01-claudenews-main.js

      - name: Commit cache and keepalive
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 更新时间戳文件（保持仓库活跃，防止GitHub暂停cron）
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .last-run

          # 添加 cache 和时间戳（含成功送达标记 .last-sent）
          git add -f cache/ .last-run .last-sent 2>/dev/null || true

          # 只在有变化时提交
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: daily update [skip ci]"
            git push
            echo "✓ Committed"
          fi

permissions:
  contents: write
  models: read      # GitHub Models（AI 摘要）免费推理所需
